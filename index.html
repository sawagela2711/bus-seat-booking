<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Вибір місця</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    .bus {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 10px 30px;
      justify-content: center;
      margin: 30px auto;
    }

    .seat {
      width: 70px;
      height: 70px;
      background: #d4edda;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
    }

    .seat.selected {
      background: #007bff;
      color: white;
    }

    .seat.taken {
      background: #ccc;
      cursor: not-allowed;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Оберіть місце</h2>

<div class="bus" id="bus"></div>

<button onclick="confirmSeat()">Підтвердити</button>

<div class="error" id="error"></div>

<script>
const seats = [
  11,12,14,13,
  21,22,24,23,
  31,32,34,33,
  41,42,44,43,
  51,52,54,53,
  61,62,64,63,
  71,72,74,73,
  81,null,null,83,
  91,92,94,93
];

const bus = document.getElementById("bus");
let selectedSeat = null;

seats.forEach(num => {
  const div = document.createElement("div");

  if (num === null) {
    div.style.visibility = "hidden";
  } else {
    div.classList.add("seat");
    div.innerText = num;

    div.onclick = () => {
      document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
      div.classList.add("selected");
      selectedSeat = num;
    };
  }

  bus.appendChild(div);
});

async function confirmSeat() {
  const error = document.getElementById("error");
  error.innerText = "";

  const userId = new URLSearchParams(window.location.search).get("user_id");

  if (!userId) {
    error.innerText = "Зайдіть через Instagram";
    return;
  }

  if (!selectedSeat) {
    error.innerText = "Оберіть місце";
    return;
  }

  try {
    const res = await fetch("https://sendseattomanychat-tu3aajs23a-uc.a.run.app", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        subscriber_id: userId,
        seat: selectedSeat
      })
    });

    const data = await res.json();

    if (data.success) {
      alert("✅ Заброньовано!");
    } else {
      error.innerText = "❌ Помилка";
    }

  } catch (e) {
    error.innerText = "❌ Сервер недоступний";
  }
}
</script>

</body>
</html>
