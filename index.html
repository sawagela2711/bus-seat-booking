<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Вибір місця</title>
  <script src="//://manychat.com" defer></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }
    body { font-family: -apple-system, sans-serif; text-align: center; background: #f8f9fa; padding: 10px; margin: 0; }
    .bus-container { display: inline-block; background: #fff; padding: 15px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
    .row { display: flex; justify-content: center; margin: 4px 0; }
    .seat { width: 50px; height: 50px; margin: 4px; background: #e8f5e9; color: #2e7d32; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; border: 2px solid #c8e6c9; }
    .seat.selected { background: #0095f6 !important; border-color: #007bb5 !important; color: #fff !important; }
    .aisle { width: 30px; }
    .confirm-btn { margin-top: 25px; padding: 18px; width: 90%; max-width: 320px; font-size: 18px; font-weight: 700; background: #0095f6; color: white; border: none; border-radius: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🚌 Оберіть місце</h2>
  <div class="bus-container"><div id="bus"></div></div>
  <button class="confirm-btn" id="confirmBtn">ПІДТВЕРДИТИ</button>

<script>
  let selectedSeat = null;
  const bus = document.getElementById("bus");
  const layout = [["11","12","14","13"],["21","22","24","23"],["31","32","34","33"],["41","42","44","43"],["51","52","54","53"],["61","62",null,null],["71","72",null,null],["81","82","84","83"],["91","92","94","93"],["101","102","104","103"],["111","112","114","113"],["121","122","124","123"],["131","132","135","134","133"]];

  layout.forEach(rowData => {
    const row = document.createElement("div"); row.className = "row";
    rowData.forEach((seatId, i) => {
      if (rowData.length === 4 && i === 2) { const aisle = document.createElement("div"); aisle.className = "aisle"; row.appendChild(aisle); }
      if (!seatId) { const empty = document.createElement("div"); empty.className = "seat"; empty.style.visibility = "hidden"; row.appendChild(empty); return; }
      const seat = document.createElement("div"); seat.className = "seat"; seat.innerText = seatId;
      seat.onclick = () => { document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected")); seat.classList.add("selected"); selectedSeat = seatId; };
      row.appendChild(seat);
    });
    bus.appendChild(row);
  });

  document.getElementById("confirmBtn").onclick = function() {
    if (!selectedSeat) { alert("Будь ласка, оберіть місце"); return; }
    
    const urlParams = new URLSearchParams(window.location.search);
    const mcpToken = urlParams.get('mcp_token');

    if (mcpToken) {
      // Прямая отправка сигнала
      const pixelUrl = `https://manychat.com{mcpToken}&event=set_field&field=seat&value=${selectedSeat}`;
      const img = new Image();
      img.src = pixelUrl;
      
      alert("📡 Сигнал відправлено! Токен знайдено: " + mcpToken.substring(0, 10) + "...");
      setTimeout(() => { window.history.back(); }, 1500);
    } else {
      alert("❌ Помилка: mcp_token не переданий из Instagram. Перевір, чи кнопка налаштована правильно!");
    }
  };
</script>
</body>
</html>
