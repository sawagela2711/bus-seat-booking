<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Выбор места</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .bus {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    .row {
      display: flex;
      margin: 5px 0;
    }

    .seat {
      width: 50px;
      height: 50px;
      margin: 5px;
      background: #4CAF50;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
    }

    .seat.booked {
      background: #999;
      cursor: not-allowed;
    }

    .seat.selected {
      background: orange;
    }

    .aisle {
      width: 30px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>🚌 Выберите место</h2>

<div class="bus" id="bus"></div>

<button onclick="confirmSeat()">Подтвердить</button>

<script>
  const bus = document.getElementById("bus");
  let selectedSeat = null;

  // Пример занятых мест (потом можно подключить базу)
  const bookedSeats = ["A2", "C3", "F1"];

  const rows = 12;

  for (let i = 0; i < rows; i++) {
    const row = document.createElement("div");
    row.className = "row";

    const rowLetter = String.fromCharCode(65 + i); // A, B, C...

    for (let j = 1; j <= 4; j++) {

      if (j === 3) {
        const aisle = document.createElement("div");
        aisle.className = "aisle";
        row.appendChild(aisle);
      }

      const seatId = rowLetter + j;

      const seat = document.createElement("div");
      seat.className = "seat";
      seat.innerText = seatId;

      if (bookedSeats.includes(seatId)) {
        seat.classList.add("booked");
      }

      seat.onclick = () => {
        if (seat.classList.contains("booked")) return;

        document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));

        seat.classList.add("selected");
        selectedSeat = seatId;
      };

      row.appendChild(seat);
    }

    bus.appendChild(row);
  }

  // 49-е место
  const extra = document.createElement("div");
  extra.className = "seat";
  extra.innerText = "Z1";

  extra.onclick = () => {
    document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
    extra.classList.add("selected");
    selectedSeat = "Z1";
  };

  bus.appendChild(extra);

  function confirmSeat() {
    if (!selectedSeat) {
      alert("Выберите место");
      return;
    }

    if (window.ManyChat) {
      ManyChat.setCustomField("seat", selectedSeat);
      ManyChat.close();
    } else {
      alert("Вы выбрали: " + selectedSeat);
    }
  }
</script>

<!-- ВАЖНО: вставь свой ID вместо 100000 -->
<script src="https://widget.manychat.com/100000.js" async></script>

</body>
</html>
