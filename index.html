<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вибір місць</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  margin-top: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 70px);
  gap: 12px;
  justify-content: center;
}

.seat {
  width: 70px;
  height: 70px;
  background: #cfe3d3;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
}

.seat.taken { background: #999; }
.seat.locked { background: #ffc107; }
.seat.selected { background: #1e73d8; color: white; }

.empty {
  width: 70px;
  height: 70px;
}

button {
  margin-top: 15px;
  padding: 12px 30px;
  font-size: 18px;
  background: #1e73d8;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:disabled {
  background: #999;
}

#statusBox {
  margin-top: 20px;
  font-size: 18px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  display: inline-block;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Оберіть місця</h2>

  <div id="grid" class="grid"></div>

  <button onclick="autoSelectSeats()">Посадити поруч</button>
  <button id="confirmBtn" onclick="sendSeat()">Підтвердити</button>

  <div id="statusBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ================= CONFIG =================
firebase.initializeApp({
  apiKey: "XXXX",
  projectId: "bus-seat-booking-73711"
});

const db = firebase.firestore();

// ================= STATE =================
let seatsMap = {};
let selectedSeats = [];
const LOCK_TIME = 120000;

// ================= USER =================
function getUserId() {
  return new URLSearchParams(location.search).get("subscriber_id");
}

// ================= STATUS =================
function showStatus(text) {
  document.getElementById("statusBox").innerHTML = text;
}

// ================= REALTIME =================
db.collection("seats").onSnapshot(snapshot => {
  seatsMap = {};
  const now = Date.now();

  snapshot.forEach(doc => {
    const d = doc.data();

    if (d.status === "locked" && d.expiresAt < now) {
      db.collection("seats").doc(doc.id).delete();
      return;
    }

    seatsMap[doc.id] = d;
  });

  render();
});

// ================= RENDER =================
function render() {
  grid.innerHTML = "";

  layout.flat().forEach(seat => {
    if (!seat) {
      const div = document.createElement("div");
      div.className = "empty";
      grid.appendChild(div);
      return;
    }

    const div = document.createElement("div");
    div.className = "seat";
    div.innerText = seat;

    const d = seatsMap[seat];

    if (d?.status === "booked") div.classList.add("taken");
    if (d?.status === "locked") div.classList.add("locked");
    if (d?.status === "pending") div.classList.add("taken"); // 🔥 pending теж зайняті

    if (selectedSeats.includes(seat)) div.classList.add("selected");

    div.onclick = () => selectSeat(seat);

    grid.appendChild(div);
  });
}

// ================= SELECT =================
async function selectSeat(seat) {
  const userId = getUserId();
  if (!userId) return alert("❌ Немає subscriber_id");

  const d = seatsMap[seat];

  if (d?.status === "booked" || d?.status === "pending")
    return alert("❌ Зайнято");

  if (d?.status === "locked" && d.userId !== userId)
    return alert("❌ Хтось вибирає");

  if (selectedSeats.includes(seat)) {
    selectedSeats = selectedSeats.filter(s => s !== seat);
    await db.collection("seats").doc(seat).delete();
    return;
  }

  await db.collection("seats").doc(seat).set({
    userId,
    status: "locked",
    expiresAt: Date.now() + LOCK_TIME
  });

  selectedSeats.push(seat);
}

// ================= SEND =================
async function sendSeat() {
  const userId = getUserId();
  const btn = document.getElementById("confirmBtn");

  if (!userId) return alert("❌ Немає subscriber_id");
  if (selectedSeats.length === 0) return alert("❌ Обери місця");

  btn.disabled = true;
  btn.innerText = "Обробка...";

  showStatus("⏳ Створюємо бронювання...");

  // 🔥 ставимо pending
  for (let s of selectedSeats) {
    await db.collection("seats").doc(s).set({
      userId,
      status: "pending"
    });
  }

  await fetch("https://sendseattomanychat-tu3aajs23a-uc.a.run.app", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      subscriber_id: userId,
      seats: selectedSeats
    })
  });

  showStatus(`
    ✅ <b>Місця заброньовано</b><br>
    Очікуйте підтвердження оплати
  `);

  selectedSeats = [];
}

// ================= CLEANUP =================
window.addEventListener("beforeunload", () => {
  const userId = getUserId();

  Object.entries(seatsMap).forEach(([seat, d]) => {
    if (d.userId === userId && d.status === "locked") {
      navigator.sendBeacon(
        "https://sendseattomanychat-tu3aajs23a-uc.a.run.app/unlockSeat",
        JSON.stringify({ seat })
      );
    }
  });
});
</script>

</body>
</html>
