<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вибір місця</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  margin-top: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 70px);
  gap: 12px;
  justify-content: center;
}

.seat {
  width: 70px;
  height: 70px;
  background: #cfe3d3;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
}

.seat.selected {
  background: #1e73d8;
  color: white;
}

.empty {
  width: 70px;
  height: 70px;
}

button {
  margin-top: 30px;
  padding: 15px 40px;
  font-size: 18px;
  background: #1e73d8;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Оберіть місце</h2>

  <div id="grid" class="grid"></div>

  <button onclick="sendSeat()">Підтвердити</button>

  <div id="msg" class="error"></div>
</div>

<script>
// ========================
// РОЗСАДКА
// ========================
const layout = [
  ["11","12",null,"14","13"],
  ["21","22",null,"24","23"],
  ["31","32",null,"34","33"],
  ["41","42",null,"44","43"],
  ["51","52",null,"54","53"],
  ["61","62",null,null,null],
  ["71","72",null,null,null],
  ["81","82",null,"84","83"],
  ["91","92",null,"94","93"],
  ["101","102",null,"104","103"],
  ["111","112",null,"114","113"],
  ["121","122",null,"124","123"],
  ["131","132","133","134","135"]
];

const grid = document.getElementById("grid");
let selectedSeat = null;

// ========================
// РЕНДЕР СІТКИ
// ========================
layout.flat().forEach(seat => {
  if (seat === null) {
    const div = document.createElement("div");
    div.className = "empty";
    grid.appendChild(div);
    return;
  }

  const div = document.createElement("div");
  div.className = "seat";
  div.innerText = seat;

  div.onclick = () => {
    document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
    div.classList.add("selected");
    selectedSeat = seat;
  };

  grid.appendChild(div);
});

// ========================
// ОТРИМАННЯ USER ID
// ========================
function getUserId() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get("user_id");
}

// ========================
// ВІДПРАВКА
// ========================
async function sendSeat() {
  const msg = document.getElementById("msg");
  msg.innerText = "";

  const userId = getUserId();

  if (!userId) {
    msg.innerText = "❌ Немає user_id (зайди через ManyChat)";
    return;
  }

  if (!selectedSeat) {
    msg.innerText = "❌ Обери місце";
    return;
  }

  try {
    const res = await fetch("https://sendseattomanychat-tu3aajs23a-uc.a.run.app", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        subscriber_id: userId,
        seat: selectedSeat
      })
    });

    const data = await res.json();

    alert("✅ Заброньовано місце: " + selectedSeat);

  } catch (e) {
    msg.innerText = "❌ Сервер недоступний";
  }
}
</script>

</body>
</html>
