<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Выбор места</title>

  <!-- НОВЫЙ КОД MANYCHAT С ХЭШЕМ -->
  <script src="//widget.manychat.com/4049391_49d46.js" defer="defer"></script>
  <script src="https://mccdn.me/assets/js/widget.js" defer="defer"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }
    body { font-family: -apple-system, system-ui, sans-serif; text-align: center; background-color: #f8f9fa; padding: 10px; margin: 0; }
    h2 { color: #333; font-size: 22px; margin: 15px 0; }
    
    .bus-container { 
      display: inline-block; background: white; padding: 15px; 
      border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); 
      border: 1px solid #e0e0e0; 
    }

    .row { display: flex; justify-content: center; margin: 4px 0; }

    .seat { 
      width: 52px; height: 52px; margin: 4px; background: #e8f5e9; color: #2e7d32; 
      display: flex; align-items: center; justify-content: center; border-radius: 12px; 
      cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; 
      border: 2px solid #c8e6c9;
    }

    .seat.booked { background: #f5f5f5 !important; border-color: #e0e0e0 !important; color: #bdbdbd !important; cursor: not-allowed; }
    .seat.selected { background: #0095f6 !important; border-color: #007bb5 !important; color: white !important; transform: scale(1.08); }
    
    .aisle { width: 35px; }

    .confirm-btn { 
      margin: 25px 0; padding: 18px; width: 90%; max-width: 320px;
      font-size: 18px; font-weight: 700; background-color: #0095f6; 
      color: white; border: none; border-radius: 15px; cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>🚌 Выберите место</h2>

  <div class="bus-container">
    <div id="bus"></div>
  </div>

  <br>
  <button class="confirm-btn" onclick="confirmSeat()">ПОДТВЕРДИТЬ ВЫБОР</button>

  <script>
    const bus = document.getElementById("bus");
    let selectedSeat = null;

    const bookedSeats = ["21", "34", "83"];

    const layout = [
      ["11","12","14","13"], ["21","22","24","23"], ["31","32","34","33"],
      ["41","42","44","43"], ["51","52","54","53"], ["61","62",null,null],
      ["71","72",null,null], ["81","82","84","83"], ["91","92","94","93"],
      ["101","102","104","103"], ["111","112","114","113"], ["121","122","124","123"],
      ["131","132","135","134","133"]
    ];

    layout.forEach(rowData => {
      const row = document.createElement("div");
      row.className = "row";
      rowData.forEach((seatId, index) => {
        if (rowData.length === 4 && index === 2) {
          const aisle = document.createElement("div");
          aisle.className = "aisle";
          row.appendChild(aisle);
        }
        if (!seatId) {
          const empty = document.createElement("div");
          empty.className = "seat";
          empty.style.visibility = "hidden";
          row.appendChild(empty);
          return;
        }
        const seat = document.createElement("div");
        seat.className = "seat";
        seat.innerText = seatId;
        if (bookedSeats.includes(seatId)) seat.classList.add("booked");

        seat.onclick = () => {
          if (seat.classList.contains("booked")) return;
          document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
          seat.classList.add("selected");
          selectedSeat = seatId;
        };
        row.appendChild(seat);
      });
      bus.appendChild(row);
    });

    function confirmSeat() {
      if (!selectedSeat) {
        alert("Пожалуйста, выберите место");
        return;
      }

      if (typeof MC !== 'undefined' && MC.getChatControl) {
        MC.getChatControl().setCustomField("seat", selectedSeat);
        setTimeout(() => { MC.getChatControl().close(); }, 600);
      } else {
        alert("ManyChat еще загружается. Попробуйте через секунду.");
      }
    }
  </script>
</body>
</html>
