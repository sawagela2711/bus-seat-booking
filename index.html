<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Вибір місця</title>

<style>
* { box-sizing: border-box; }
body {
  font-family: sans-serif;
  text-align: center;
  background: #f5f5f5;
  margin: 0;
}

h2 {
  margin-top: 20px;
}

.bus-container {
  display: inline-block;
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-top: 10px;
}

.row {
  display: flex;
  justify-content: center;
  margin: 6px 0;
}

.seat {
  width: 50px;
  height: 50px;
  margin: 5px;
  background: #e8f5e9;
  color: #2e7d32;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.seat.selected {
  background: #0095f6;
  color: white;
}

.confirm-btn {
  margin-top: 20px;
  padding: 16px;
  width: 250px;
  font-size: 18px;
  background: #0095f6;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

.confirm-btn:disabled {
  background: #9ecdf5;
}

.status {
  margin-top: 10px;
  font-size: 14px;
  color: #666;
}
</style>
</head>

<body>

<h2>🚌 Оберіть місце</h2>

<div class="bus-container">
  <div id="bus"></div>
</div>

<br>

<button class="confirm-btn" id="confirmBtn" disabled>
Підтвердити
</button>

<div class="status" id="status"></div>

<script>
let selectedSeat = null;

const bus = document.getElementById("bus");
const btn = document.getElementById("confirmBtn");
const status = document.getElementById("status");

const layout = [
  ["11","12",null,"14","13"],
  ["21","22",null,"24","23"],
  ["31","32",null,"34","33"],
  ["41","42",null,"44","43"],
  ["51","52",null,"54","53"],
  ["61","62",null,null,null],
  ["71","72",null,null,null],
  ["81","82",null,"84","83"],
  ["91","92",null,"94","93"],
  ["101","102",null,"104","103"],
  ["111","112",null,"114","113"],
  ["121","122",null,"124","123"],
  ["131","132","133","134","135"]
];

// створення місць
layout.forEach(rowData => {
  const row = document.createElement("div");
  row.className = "row";

  rowData.forEach(seatId => {

    // ПРОХІД
    if (seatId === null) {
      const aisle = document.createElement("div");
      aisle.style.width = "30px";
      row.appendChild(aisle);
      return;
    }

    const seat = document.createElement("div");
    seat.className = "seat";
    seat.innerText = seatId;

    seat.onclick = () => {

      // toggle (можна зняти вибір)
      if (seat.classList.contains("selected")) {
        seat.classList.remove("selected");
        selectedSeat = null;
        btn.disabled = true;
        return;
      }

      document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
      seat.classList.add("selected");
      selectedSeat = seatId;

      btn.disabled = false;
    };

    row.appendChild(seat);
  });

  bus.appendChild(row);
});

// кнопка підтвердження
btn.onclick = async function() {

  if (!selectedSeat) return;

  const userRef = localStorage.getItem("user_ref");

  if (!userRef) {
    alert("❌ Немає user_ref (відкрий через ManyChat)");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Бронюємо...";
  status.innerText = "Відправка...";

  try {
    await fetch("https://sendseattomanychat-tu3aajs23a-uc.a.run.app", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userRef: userRef,
        seat: selectedSeat
      })
    });

    status.innerText = "✅ Місце заброньовано";
    btn.innerText = "Готово";

  } catch (e) {
    status.innerText = "❌ Помилка відправки";
    btn.innerText = "Спробувати ще";
    btn.disabled = false;
  }
};
</script>

</body>
</html>
