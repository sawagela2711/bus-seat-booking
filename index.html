<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Вибір місця</title>

<style>
* { box-sizing: border-box; }
body { font-family: sans-serif; text-align: center; background: #f5f5f5; }

.bus-container {
  display: inline-block;
  background: white;
  padding: 20px;
  border-radius: 20px;
}

.row { display: flex; justify-content: center; }

.seat {
  width: 50px;
  height: 50px;
  margin: 5px;
  background: #e8f5e9;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  cursor: pointer;
}

.seat.selected {
  background: #0095f6;
  color: white;
}

.seat.reserved {
  background: #ccc;
  pointer-events: none;
}

.confirm-btn {
  margin-top: 20px;
  padding: 15px;
  font-size: 18px;
  background: #0095f6;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Оберіть місце</h2>

<div class="bus-container">
  <div id="bus"></div>
</div>

<button class="confirm-btn" id="confirmBtn">Підтвердити</button>

<script>
let selectedSeat = null;

const bus = document.getElementById("bus");

const layout = [
  ["11","12","14","13"],
  ["21","22","24","23"],
  ["31","32","34","33"]
];

// створення місць
layout.forEach(rowData => {
  const row = document.createElement("div");
  row.className = "row";

  rowData.forEach((seatId, i) => {

    if (i === 2) {
      const gap = document.createElement("div");
      gap.style.width = "20px";
      row.appendChild(gap);
    }

    const seat = document.createElement("div");
    seat.className = "seat";
    seat.innerText = seatId;

    seat.onclick = () => {
      if (seat.classList.contains("selected")) {
        seat.classList.remove("selected");
        selectedSeat = null;
        return;
      }

      document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
      seat.classList.add("selected");
      selectedSeat = seatId;
    };

    row.appendChild(seat);
  });

  bus.appendChild(row);
});

// підтвердження
document.getElementById("confirmBtn").onclick = async function() {

  if (!selectedSeat) {
    alert("Оберіть місце");
    return;
  }

  const userRef = localStorage.getItem("user_ref");

  if (!userRef) {
    alert("Немає user_ref");
    return;
  }

  try {
    await fetch("https://sendseattomanychat-tu3aajs23a-uc.a.run.app", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userRef: userRef,
        seat: selectedSeat
      })
    });

    alert("Місце заброньовано!");

  } catch (e) {
    alert("Помилка відправки");
  }
};
</script>

</body>
</html>
