<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bus Seat Booking PRO</title>

  <style>
    body {
      font-family: -apple-system, sans-serif;
      text-align: center;
      background: #f6f7f9;
      margin: 0;
      padding: 10px;
    }

    .bus {
      display: inline-block;
      background: #fff;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .row {
      display: flex;
      justify-content: center;
      margin: 4px 0;
    }

    .seat {
      width: 50px;
      height: 50px;
      margin: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-weight: bold;
      border: 2px solid #c8e6c9;
      background: #e8f5e9;
      color: #2e7d32;
      cursor: pointer;
    }

    .seat.selected {
      background: #0095f6;
      color: #fff;
      border-color: #007bb5;
    }

    .seat.taken {
      background: #ccc;
      color: #666;
      border-color: #aaa;
      pointer-events: none;
    }

    .aisle { width: 20px; }

    button {
      margin-top: 20px;
      padding: 15px;
      width: 90%;
      max-width: 300px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      background: #0095f6;
      color: #fff;
      cursor: pointer;
    }

    button:disabled { opacity: 0.6; }
  </style>
</head>

<body>

<h2>🚌 Оберіть місце</h2>

<div class="bus" id="bus"></div>
<button id="confirmBtn">ПІДТВЕРДИТИ</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbTX27juUy1RUsfciV8Mk_LdKSjFTcpYo",
  authDomain: "bus-seat-booking-73711.firebaseapp.com",
  projectId: "bus-seat-booking-73711",
  storageBucket: "bus-seat-booking-73711.firebasestorage.app",
  messagingSenderId: "759447777721",
  appId: "1:759447777721:web:5950013220b86e1c6a0668"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const bus = document.getElementById("bus");
const confirmBtn = document.getElementById("confirmBtn");

let selectedSeat = null;
let reserved = {};

const seatsRef = doc(db, "bus", "seats");

const layout = [
  ["11","12","14","13"],
  ["21","22","24","23"],
  ["31","32","34","33"],
  ["41","42","44","43"],
  ["51","52","54","53"],
  ["61","62",null,null],
  ["71","72",null,null],
  ["81","82","84","83"],
  ["91","92","94","93"],
  ["101","102","104","103"],
  ["111","112","114","113"],
  ["121","122","124","123"],
  ["131","132","135","134","133"]
];

// 🔥 LIVE seats
onSnapshot(seatsRef, (snap) => {
  reserved = snap.data() || {};
  renderSeats();
});

function renderSeats() {
  bus.innerHTML = "";

  layout.forEach(rowData => {
    const row = document.createElement("div");
    row.className = "row";

    const hasAisle = rowData.length === 4;

    rowData.forEach((seatId, i) => {

      if (hasAisle && i === 2) {
        const aisle = document.createElement("div");
        aisle.className = "aisle";
        row.appendChild(aisle);
      }

      if (!seatId) {
        const empty = document.createElement("div");
        empty.className = "seat";
        empty.style.visibility = "hidden";
        row.appendChild(empty);
        return;
      }

      const seat = document.createElement("div");
      seat.className = "seat";
      seat.innerText = seatId;

      if (reserved[seatId]) {
        seat.classList.add("taken");
        seat.innerText = "✖";
      }

      seat.onclick = () => {
        if (reserved[seatId]) return;

        document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));

        if (selectedSeat === seatId) {
          selectedSeat = null;
          return;
        }

        seat.classList.add("selected");
        selectedSeat = seatId;
      };

      row.appendChild(seat);
    });

    bus.appendChild(row);
  });
}

// 🔥 BOOK
confirmBtn.onclick = async () => {

  if (!selectedSeat) {
    alert("Оберіть місце");
    return;
  }

  const userRef = localStorage.getItem("user_ref");

  if (!userRef) {
    alert("Немає user_ref");
    return;
  }

  confirmBtn.disabled = true;
  confirmBtn.innerText = "Бронюємо...";

  const snap = await getDoc(seatsRef);
  const data = snap.data() || {};

  if (data[selectedSeat]) {
    alert("Місце вже зайняте");
    confirmBtn.disabled = false;
    confirmBtn.innerText = "ПІДТВЕРДИТИ";
    return;
  }

  data[selectedSeat] = {
    userRef,
    time: Date.now()
  };

  await setDoc(seatsRef, data);

  // 🔥 ManyChat
  fetch("YOUR_MANYCHAT_WEBHOOK_URL", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_ref: userRef,
      seat: selectedSeat
    })
  });

  alert("Місце заброньовано!");
  window.history.back();
};

</script>

</body>
</html>
