<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вибір місць</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  margin-top: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 70px);
  gap: 12px;
  justify-content: center;
}

.seat {
  width: 70px;
  height: 70px;
  background: #cfe3d3;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
}

.seat.taken { background: #999; }
.seat.locked { background: #ffc107; }
.seat.selected { background: #1e73d8; color: white; }

.empty {
  width: 70px;
  height: 70px;
}

button {
  margin-top: 15px;
  padding: 12px 30px;
  font-size: 18px;
  background: #1e73d8;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:disabled {
  background: #999;
}

#statusBox {
  margin-top: 20px;
  font-size: 18px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  display: inline-block;
}
</style>
</head>

<body>

<div class="container">
  <h2>Оберіть місця</h2>

  <div id="grid" class="grid"></div>

  <button id="confirmBtn">Підтвердити</button>

  <div id="statusBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// ================= CONFIG =================
firebase.initializeApp({
  apiKey: "XXXX",
  projectId: "bus-seat-booking-73711"
});

const db = firebase.firestore();

// 🔥 ВАЖЛИВО: ПРАВИЛЬНИЙ URL
const CREATE_BOOKING_URL = "https://createbooking-tu3aajs23a-uc.a.run.app";

// ================= LAYOUT =================
const layout = [
["11","12",null,"14","13"],
["21","22",null,"24","23"],
["31","32",null,"34","33"],
["41","42",null,"44","43"],
["51","52",null,"54","53"],
["61","62",null,null,null],
["71","72",null,null,null],
["81","82",null,"84","83"],
["91","92",null,"94","93"],
["101","102",null,"104","103"],
["111","112",null,"114","113"],
["121","122",null,"124","123"],
["131","132","133","134","135"]
];

let seatsMap = {};
let selectedSeats = [];
const LOCK_TIME = 120000;

function getUserId() {
  return new URLSearchParams(location.search).get("subscriber_id") || "1177468495";
}

function showStatus(text) {
  document.getElementById("statusBox").innerHTML = text;
}

// ================= REALTIME =================
db.collection("seats").onSnapshot(snapshot => {
  seatsMap = {};
  const now = Date.now();

  snapshot.forEach(doc => {
    const d = doc.data();

    if (d.status === "locked" && d.expiresAt < now) {
      db.collection("seats").doc(doc.id).delete();
      return;
    }

    seatsMap[doc.id] = d;
  });

  render();
});

// ================= RENDER =================
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  layout.flat().forEach(seat => {
    if (!seat) {
      const div = document.createElement("div");
      div.className = "empty";
      grid.appendChild(div);
      return;
    }

    const div = document.createElement("div");
    div.className = "seat";
    div.innerText = seat;

    const d = seatsMap[seat];

    if (d?.status === "booked" || d?.status === "pending") div.classList.add("taken");
    if (d?.status === "locked") div.classList.add("locked");
    if (selectedSeats.includes(seat)) div.classList.add("selected");

    div.onclick = () => selectSeat(seat);

    grid.appendChild(div);
  });
}

// ================= SELECT =================
async function selectSeat(seat) {
  const userId = getUserId();
  const d = seatsMap[seat];

  if (d?.status === "booked" || d?.status === "pending")
    return alert("❌ Зайнято");

  if (d?.status === "locked" && d.userId !== userId)
    return alert("❌ Хтось вибирає");

  if (selectedSeats.includes(seat)) {
    selectedSeats = selectedSeats.filter(s => s !== seat);
    await db.collection("seats").doc(seat).delete();
    return;
  }

  await db.collection("seats").doc(seat).set({
    userId,
    status: "locked",
    expiresAt: Date.now() + LOCK_TIME
  });

  selectedSeats.push(seat);
}

// ================= SEND =================
document.getElementById("confirmBtn").addEventListener("click", sendSeat);

async function sendSeat() {
  const userId = getUserId();
  const btn = document.getElementById("confirmBtn");

  if (selectedSeats.length === 0) {
    showStatus("⚠️ Обери місця");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Обробка...";

  showStatus("⏳ Створюємо бронювання...");

  try {

    const response = await fetch(CREATE_BOOKING_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        subscriber_id: userId,
        seats: selectedSeats
      })
    });

    const data = await response.json();
    console.log("SERVER:", data);

    if (!data.success) throw new Error("server error");

    showStatus(`
      ✅ <b>Місця заброньовано</b><br>
      Очікуйте підтвердження оплати
    `);

    selectedSeats = [];

  } catch (e) {
    console.error(e);
    showStatus("❌ Помилка з'єднання (fetch)");

    btn.disabled = false;
    btn.innerText = "Підтвердити";
  }
}

</script>

</body>
</html>
