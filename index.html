<script>
  let selectedSeat = null;

  const bus = document.getElementById("bus");
  const confirmBtn = document.getElementById("confirmBtn");

  // "резерви" в браузері (імітація зайнятих місць)
  const reservedSeats = JSON.parse(localStorage.getItem("reservedSeats") || "[]");

  const layout = [
    ["11","12","14","13"],
    ["21","22","24","23"],
    ["31","32","34","33"],
    ["41","42","44","43"],
    ["51","52","54","53"],
    ["61","62",null,null],
    ["71","72",null,null],
    ["81","82","84","83"],
    ["91","92","94","93"],
    ["101","102","104","103"],
    ["111","112","114","113"],
    ["121","122","124","123"],
    ["131","132","135","134","133"]
  ];

  layout.forEach(rowData => {
    const row = document.createElement("div");
    row.className = "row";

    const hasAisle = rowData.length === 4;

    rowData.forEach((seatId, i) => {

      // універсальний прохід
      if (hasAisle && i === 2) {
        const aisle = document.createElement("div");
        aisle.style.width = "20px";
        row.appendChild(aisle);
      }

      if (!seatId) {
        const empty = document.createElement("div");
        empty.className = "seat";
        empty.style.visibility = "hidden";
        row.appendChild(empty);
        return;
      }

      const seat = document.createElement("div");
      seat.className = "seat";
      seat.innerText = seatId;

      // якщо місце вже "резервоване"
      if (reservedSeats.includes(seatId)) {
        seat.style.background = "#ccc";
        seat.style.color = "#666";
        seat.style.borderColor = "#aaa";
        seat.style.pointerEvents = "none";
        seat.innerText = "✖";
      } else {
        seat.onclick = () => {

          // toggle вибору
          if (seat.classList.contains("selected")) {
            seat.classList.remove("selected");
            selectedSeat = null;
            return;
          }

          document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
          seat.classList.add("selected");
          selectedSeat = seatId;
        };
      }

      row.appendChild(seat);
    });

    bus.appendChild(row);
  });


  confirmBtn.onclick = function () {

    if (!selectedSeat) {
      alert("Оберіть місце");
      return;
    }

    const userRef = localStorage.getItem("user_ref");

    if (!userRef) {
      alert("❌ Немає user_ref");
      return;
    }

    // UX loading
    confirmBtn.disabled = true;
    confirmBtn.innerText = "Відправляємо...";

    const pixelUrl =
      `https://manychat.com/fb?user_ref=${encodeURIComponent(userRef)}&event=set_field&field=seat&value=${encodeURIComponent(selectedSeat)}`;

    const img = new Image();
    img.src = pixelUrl;

    // 👉 резервуємо місце локально
    reservedSeats.push(selectedSeat);
    localStorage.setItem("reservedSeats", JSON.stringify(reservedSeats));

    setTimeout(() => {
      alert("Місце заброньовано!");
      window.history.back();
    }, 700);
  };
</script>
