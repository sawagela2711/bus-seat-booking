<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Seats</title>

<style>
body { font-family: Arial; text-align: center; background: #f5f5f5; }

.grid {
  display: grid;
  grid-template-columns: repeat(5, 70px);
  gap: 12px;
  justify-content: center;
}

.seat {
  width: 70px;
  height: 70px;
  background: #cfe3d3;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.seat.taken { background: #999; }
.seat.locked { background: #ffc107; }
.seat.selected { background: #1e73d8; color: white; }

.empty { width: 70px; height: 70px; }

button {
  margin-top: 15px;
  padding: 12px 30px;
}
</style>
</head>

<body>

<h2>Вибір місць</h2>

<div id="grid" class="grid"></div>

<button onclick="autoSelectSeats()">Посадити поруч</button>
<button onclick="sendSeat()">Підтвердити</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ================= CONFIG =================
firebase.initializeApp({
  apiKey: "XXXX",
  projectId: "bus-seat-booking-73711"
});

const db = firebase.firestore();

// ================= РОЗСАДКА =================
const layout = [
  ["11","12",null,"14","13"],
  ["21","22",null,"24","23"],
  ["31","32",null,"34","33"],
  ["41","42",null,"44","43"],
  ["51","52",null,"54","53"],
  ["61","62",null,null,null],
  ["71","72",null,null,null],
  ["81","82",null,"84","83"],
  ["91","92",null,"94","93"],
  ["101","102",null,"104","103"],
  ["111","112",null,"114","113"],
  ["121","122",null,"124","123"],
  ["131","132","133","134","135"]
];

// ================= STATE =================
let seatsMap = {};
let selectedSeats = [];
const LOCK_TIME = 2 * 60 * 1000;

// ================= USER =================
function getUserId() {
  return new URLSearchParams(location.search).get("subscriber_id");
}

// ================= REALTIME =================
db.collection("seats").onSnapshot(snapshot => {
  seatsMap = {};
  const now = Date.now();

  snapshot.forEach(doc => {
    const d = doc.data();
    if (d.status === "locked" && d.expiresAt < now) return;
    seatsMap[doc.id] = d;
  });

  render();
});

// ================= RENDER =================
function render() {
  grid.innerHTML = "";

  layout.flat().forEach(seat => {
    if (!seat) {
      const empty = document.createElement("div");
      empty.className = "empty";
      grid.appendChild(empty);
      return;
    }

    const div = document.createElement("div");
    div.className = "seat";
    div.innerText = seat;

    const d = seatsMap[seat];

    if (d?.status === "booked") div.classList.add("taken");
    if (d?.status === "locked") div.classList.add("locked");
    if (selectedSeats.includes(seat)) div.classList.add("selected");

    div.onclick = () => selectSeat(seat);

    grid.appendChild(div);
  });
}

// ================= SELECT =================
async function selectSeat(seat) {
  const userId = getUserId();
  if (!userId) return;

  const d = seatsMap[seat];

  if (d?.status === "booked") return alert("Зайнято");
  if (d?.status === "locked" && d.userId !== userId)
    return alert("Хтось вибирає");

  await db.collection("seats").doc(seat).set({
    userId,
    status: "locked",
    expiresAt: Date.now() + LOCK_TIME
  });

  if (selectedSeats.includes(seat)) {
    selectedSeats = selectedSeats.filter(s => s !== seat);
  } else {
    selectedSeats.push(seat);
  }
}

// ================= SMART ALGO =================
function isFree(seat) {
  const d = seatsMap[seat];
  return !d || (d.status === "locked" && d.userId === getUserId());
}

function getSeatPos(seat) {
  for (let r = 0; r < layout.length; r++) {
    for (let c = 0; c < layout[r].length; c++) {
      if (layout[r][c] === seat) return { r, c };
    }
  }
}

function distance(a, b) {
  return Math.abs(a.r - b.r) + Math.abs(a.c - b.c);
}

function score(group) {
  let s = 0;

  for (let i = 0; i < group.length; i++) {
    for (let j = i + 1; j < group.length; j++) {
      s -= distance(getSeatPos(group[i]), getSeatPos(group[j])) * 10;
    }
  }

  return s;
}

function combinations(arr, k) {
  const res = [];

  function helper(start, combo) {
    if (combo.length === k) {
      res.push([...combo]);
      return;
    }

    for (let i = start; i < arr.length; i++) {
      combo.push(arr[i]);
      helper(i + 1, combo);
      combo.pop();
    }
  }

  helper(0, []);
  return res;
}

function findBestSeats(count) {
  const free = [];

  layout.forEach(row =>
    row.forEach(s => {
      if (s && isFree(s)) free.push(s);
    })
  );

  const combos = combinations(free, count);

  let best = null;
  let bestScore = -Infinity;

  combos.forEach(g => {
    const sc = score(g);
    if (sc > bestScore) {
      bestScore = sc;
      best = g;
    }
  });

  return best;
}

// ================= AUTO =================
async function autoSelectSeats() {
  const seats = findBestSeats(4);

  if (!seats) return alert("Немає місць");

  const userId = getUserId();

  for (let s of seats) {
    await db.collection("seats").doc(s).set({
      userId,
      status: "locked",
      expiresAt: Date.now() + LOCK_TIME
    });
  }

  selectedSeats = seats;
}

// ================= SEND =================
async function sendSeat() {
  const userId = getUserId();

  for (let s of selectedSeats) {
    await db.collection("seats").doc(s).update({
      status: "booked"
    });
  }

  await fetch("https://sendseattomanychat-tu3aajs23a-uc.a.run.app", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      subscriber_id: userId,
      seat: selectedSeats.join(", ")
    })
  });

  alert("Готово: " + selectedSeats.join(", "));
}

// ================= CLEANUP =================
window.addEventListener("beforeunload", () => {
  Object.entries(seatsMap).forEach(([seat, d]) => {
    if (d.userId === getUserId() && d.status === "locked") {
      navigator.sendBeacon(
        "https://sendseattomanychat-tu3aajs23a-uc.a.run.app/unlockSeat",
        JSON.stringify({ seat })
      );
    }
  });
});
</script>

</body>
</html>
