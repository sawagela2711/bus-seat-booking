<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вибір місць</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.container {
  margin-top: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 70px);
  gap: 12px;
  justify-content: center;
}

.seat {
  width: 70px;
  height: 70px;
  background: #cfe3d3;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: bold;
}

.seat.taken { background: #999; }
.seat.locked { background: #ffc107; }
.seat.selected { background: #1e73d8; color: white; }

.empty {
  width: 70px;
  height: 70px;
}

button {
  margin-top: 15px;
  padding: 12px 30px;
  font-size: 18px;
  background: #1e73d8;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Оберіть місця</h2>

  <div id="grid" class="grid"></div>

  <button onclick="autoSelectSeats()">Посадити поруч</button>
  <button onclick="sendSeat()">Підтвердити</button>

  <div id="msg" class="error"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ================= CONFIG =================
firebase.initializeApp({
  apiKey: "XXXX",
  projectId: "bus-seat-booking-73711"
});

const db = firebase.firestore();

// ================= РОЗСАДКА =================
const layout = [
["11","12",null,"14","13"],
["21","22",null,"24","23"],
["31","32",null,"34","33"],
["41","42",null,"44","43"],
["51","52",null,"54","53"],
["61","62",null,null,null],
["71","72",null,null,null],
["81","82",null,"84","83"],
["91","92",null,"94","93"],
["101","102",null,"104","103"],
["111","112",null,"114","113"],
["121","122",null,"124","123"],
["131","132","133","134","135"]
];

// ================= STATE =================
let seatsMap = {};
let selectedSeats = [];
const LOCK_TIME = 120000;

// ================= USER =================
function getUserId() {
  return new URLSearchParams(location.search).get("subscriber_id");
}

// ================= REALTIME =================
db.collection("seats").onSnapshot(snapshot => {
  seatsMap = {};
  const now = Date.now();

  snapshot.forEach(doc => {
    const d = doc.data();

    if (d.status === "locked" && d.expiresAt < now) {
      db.collection("seats").doc(doc.id).delete();
      return;
    }

    seatsMap[doc.id] = d;
  });

  render();
});

// ================= RENDER =================
function render() {
  grid.innerHTML = "";

  layout.flat().forEach(seat => {
    if (!seat) {
      const div = document.createElement("div");
      div.className = "empty";
      grid.appendChild(div);
      return;
    }

    const div = document.createElement("div");
    div.className = "seat";
    div.innerText = seat;

    const d = seatsMap[seat];

    if (d?.status === "booked") div.classList.add("taken");
    if (d?.status === "locked") div.classList.add("locked");
    if (selectedSeats.includes(seat)) div.classList.add("selected");

    div.onclick = () => selectSeat(seat);

    grid.appendChild(div);
  });
}

// ================= SELECT =================
async function selectSeat(seat) {
  const userId = getUserId();
  if (!userId) return alert("❌ Немає subscriber_id");

  const d = seatsMap[seat];

  if (d?.status === "booked") return alert("❌ Зайнято");
  if (d?.status === "locked" && d.userId !== userId)
    return alert("❌ Хтось вибирає");

  if (selectedSeats.includes(seat)) {
    selectedSeats = selectedSeats.filter(s => s !== seat);
    await db.collection("seats").doc(seat).delete();
    return;
  }

  await db.collection("seats").doc(seat).set({
    userId,
    status: "locked",
    expiresAt: Date.now() + LOCK_TIME
  });

  selectedSeats.push(seat);
}

// ================= SMART =================
function isFree(seat) {
  const d = seatsMap[seat];
  return !d || (d.status === "locked" && d.userId === getUserId());
}

function getSeatPos(seat) {
  for (let r = 0; r < layout.length; r++) {
    for (let c = 0; c < layout[r].length; c++) {
      if (layout[r][c] === seat) return { r, c };
    }
  }
}

function distance(a, b) {
  return Math.abs(a.r - b.r) + Math.abs(a.c - b.c);
}

function score(group) {
  let s = 0;
  for (let i = 0; i < group.length; i++) {
    for (let j = i + 1; j < group.length; j++) {
      s -= distance(getSeatPos(group[i]), getSeatPos(group[j])) * 10;
    }
  }
  return s;
}

function combinations(arr, k) {
  const res = [];
  function helper(start, combo) {
    if (combo.length === k) {
      res.push([...combo]);
      return;
    }
    for (let i = start; i < arr.length; i++) {
      combo.push(arr[i]);
      helper(i + 1, combo);
      combo.pop();
    }
  }
  helper(0, []);
  return res;
}

function findBestSeats(count) {
  const free = [];

  layout.forEach(row =>
    row.forEach(s => {
      if (s && isFree(s)) free.push(s);
    })
  );

  const combos = combinations(free, count);

  let best = null;
  let bestScore = -Infinity;

  combos.forEach(g => {
    const sc = score(g);
    if (sc > bestScore) {
      bestScore = sc;
      best = g;
    }
  });

  return best;
}

// ================= AUTO =================
async function autoSelectSeats() {
  const seats = findBestSeats(4);

  if (!seats) return alert("❌ Немає місць поруч");

  const userId = getUserId();

  for (let s of seats) {
    await db.collection("seats").doc(s).set({
      userId,
      status: "locked",
      expiresAt: Date.now() + LOCK_TIME
    });
  }

  selectedSeats = seats;
}

// ================= SEND =================
async function sendSeat() {
  const userId = getUserId();

  if (!userId) return alert("❌ Немає subscriber_id");
  if (selectedSeats.length === 0) return alert("❌ Обери місця");

  for (let s of selectedSeats) {
    await db.collection("seats").doc(s).set({
      userId,
      status: "booked"
    });
  }

  await fetch("https://sendseattomanychat-tu3aajs23a-uc.a.run.app", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      subscriber_id: userId,
      seats: selectedSeats   // 🔥 МАСИВ!
    })
  });

  alert("✅ Заброньовано: " + selectedSeats.join(", "));
}

// ================= CLEANUP =================
window.addEventListener("beforeunload", () => {
  const userId = getUserId();

  Object.entries(seatsMap).forEach(([seat, d]) => {
    if (d.userId === userId && d.status === "locked") {
      navigator.sendBeacon(
        "https://sendseattomanychat-tu3aajs23a-uc.a.run.app/unlockSeat",
        JSON.stringify({ seat })
      );
    }
  });
});
</script>

</body>
</html>
