<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Выбор места</title>

  <!-- Твой ID 4049391 -->
  <script src="https://manychat.com" defer></script>

  <style>
    /* Блокируем выделение текста и зум при тапах в Instagram */
    * { -webkit-tap-highlight-color: transparent; user-select: none; }
    
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
           text-align: center; background-color: #fafafa; padding: 10px; margin: 0; }
    
    h2 { color: #262626; font-size: 20px; margin: 15px 0; }

    .bus-wrapper { display: inline-block; background: white; padding: 10px; border-radius: 24px; 
                   box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #dbdbdb; }

    .row { display: flex; justify-content: center; margin: 4px 0; }

    /* Кнопки мест: идеальный размер для пальца в Instagram */
    .seat { 
      width: 50px; height: 50px; margin: 4px; background: #edffed; color: #2d8a2d; 
      display: flex; align-items: center; justify-content: center; border-radius: 12px; 
      cursor: pointer; font-size: 15px; font-weight: 700; transition: all 0.1s ease; 
      border: 2px solid #a8e6a8; box-sizing: border-box;
    }

    .seat.booked { background: #efefef !important; border-color: #dbdbdb !important; color: #8e8e8e !important; cursor: not-allowed; }
    .seat.selected { background: #0095f6 !important; border-color: #0074cc !important; color: white !important; transform: scale(1.05); }
    
    .aisle { width: 30px; }

    /* Кнопка в стиле Instagram */
    .confirm-btn { 
      margin: 25px 0; padding: 16px 20px; font-size: 16px; font-weight: 600;
      background-color: #0095f6; color: white; border: none; border-radius: 12px; 
      cursor: pointer; width: 90%; max-width: 320px;
    }
    
    .confirm-btn:active { opacity: 0.7; }
  </style>
</head>
<body>

  <h2>🚌 Выберите место</h2>

  <div class="bus-wrapper">
    <div id="bus"></div>
  </div>

  <br>
  <button class="confirm-btn" onclick="confirmSeat()">ПОДТВЕРДИТЬ</button>

  <script>
    const bus = document.getElementById("bus");
    let selectedSeat = null;

    const bookedSeats = ["21", "34", "83"];

    const layout = [
      ["11","12","14","13"], ["21","22","24","23"], ["31","32","34","33"],
      ["41","42","44","43"], ["51","52","54","53"], ["61","62",null,null],
      ["71","72",null,null], ["81","82","84","83"], ["91","92","94","93"],
      ["101","102","104","103"], ["111","112","114","113"], ["121","122","124","123"],
      ["131","132","135","134","133"]
    ];

    layout.forEach(rowData => {
      const row = document.createElement("div");
      row.className = "row";
      rowData.forEach((seatId, index) => {
        if (rowData.length === 4 && index === 2) {
          const aisle = document.createElement("div");
          aisle.className = "aisle";
          row.appendChild(aisle);
        }
        if (!seatId) {
          const empty = document.createElement("div");
          empty.className = "seat";
          empty.style.visibility = "hidden";
          row.appendChild(empty);
          return;
        }
        const seat = document.createElement("div");
        seat.className = "seat";
        seat.innerText = seatId;
        if (bookedSeats.includes(seatId)) seat.classList.add("booked");

        seat.onclick = () => {
          if (seat.classList.contains("booked")) return;
          document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
          seat.classList.add("selected");
          selectedSeat = seatId;
        };
        row.appendChild(seat);
      });
      bus.appendChild(row);
    });

    function confirmSeat() {
      if (!selectedSeat) {
        alert("Пожалуйста, выберите место");
        return;
      }

      // Работа с ManyChat в Instagram
      if (typeof MC !== 'undefined' && MC.getChatControl) {
          MC.getChatControl().setCustomField("seat", selectedSeat);
          setTimeout(() => { MC.getChatControl().close(); }, 500);
      } else if (window.ManyChat) {
          window.ManyChat.setCustomField("seat", selectedSeat);
          window.ManyChat.close();
      } else {
          alert("Выбрано место: " + selectedSeat + ". Откройте через Direct для связи с ManyChat.");
      }
    }
  </script>
</body>
</html>
