<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Вибір місця</title>

  <!-- Твой Manychat Pixel -->
  <script src="//://manychat.com" defer="defer"></script>
  <script src="https://mccdn.me" defer="defer"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none; }
    body { font-family: -apple-system, system-ui, sans-serif; text-align: center; background: #f8f9fa; padding: 10px; margin: 0; }
    h2 { font-size: 22px; margin: 15px 0; color: #333; }
    .bus-container { display: inline-block; background: #fff; padding: 15px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; margin-bottom: 20px; }
    .row { display: flex; justify-content: center; margin: 4px 0; }
    .seat { width: 50px; height: 50px; margin: 4px; background: #e8f5e9; color: #2e7d32; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; border: 2px solid #c8e6c9; transition: 0.2s; touch-action: manipulation; }
    .seat.booked { background: #f5f5f5; border-color: #e0e0e0; color: #bdbdbd; cursor: not-allowed; }
    .seat.selected { background: #0095f6; border-color: #007bb5; color: #fff; transform: scale(1.08); }
    .aisle { width: 30px; }
    .confirm-btn { margin: 25px 0; padding: 18px; width: 90%; max-width: 320px; font-size: 18px; font-weight: 700; background: #0095f6; color: white; border: none; border-radius: 15px; cursor: pointer; }
  </style>
</head>
<body>

<h2>🚌 Оберіть місце</h2>
<div class="bus-container"><div id="bus"></div></div>
<button class="confirm-btn" type="button" id="confirmBtn">ПІДТВЕРДИТИ</button>

<script>
  let selectedSeat = null;
  const bus = document.getElementById("bus");
  const bookedSeats = ["21", "34", "83"];
  const layout = [
    ["11","12","14","13"], ["21","22","24","23"], ["31","32","34","33"],
    ["41","42","44","43"], ["51","52","54","53"], ["61","62",null,null],
    ["71","72",null,null], ["81","82","84","83"], ["91","92","94","93"],
    ["101","102","104","103"], ["111","112","114","113"], ["121","122","124","123"],
    ["131","132","135","134","133"]
  ];

  layout.forEach(rowData => {
    const row = document.createElement("div");
    row.className = "row";
    rowData.forEach((seatId, i) => {
      if (rowData.length === 4 && i === 2) {
        const aisle = document.createElement("div");
        aisle.className = "aisle";
        row.appendChild(aisle);
      }
      if (!seatId) {
        const empty = document.createElement("div");
        empty.className = "seat"; empty.style.visibility = "hidden";
        row.appendChild(empty); return;
      }
      const seat = document.createElement("div");
      seat.className = "seat"; seat.innerText = seatId;
      if (bookedSeats.includes(seatId)) seat.classList.add("booked");
      seat.addEventListener("click", () => {
        if (seat.classList.contains("booked")) return;
        document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
        seat.classList.add("selected");
        selectedSeat = seatId;
      });
      row.appendChild(seat);
    });
    bus.appendChild(row);
  });

  document.getElementById("confirmBtn").addEventListener("click", () => {
    if (!selectedSeat) { alert("Будь ласка, оберіть місце"); return; }
    
    // Получаем mcp_token из URL
    const urlParams = new URLSearchParams(window.location.search);
    const mcpToken = urlParams.get('mcp_token');
    
    // 1. Пытаемся через SDK (если оно загрузилось)
    const mc = window.MC || (window.ManyChat && window.ManyChat.getChatControl ? window.ManyChat.getChatControl() : null);
    
    if (mc && (typeof mc.setCustomField === 'function' || typeof mc.setFieldValue === 'function')) {
      if (mc.setCustomField) mc.setCustomField("seat", selectedSeat);
      else mc.setFieldValue("seat", selectedSeat);
      alert("✅ Місце " + selectedSeat + " обрано!");
      setTimeout(() => { if (mc.close) mc.close(); }, 500);
    } 
    // 2. РЕЗЕРВНЫЙ И САМЫЙ НАДЕЖНЫЙ ПУТЬ (Pixel + mcp_token)
    else if (mcpToken) {
      const pixelUrl = `https://manychat.com{mcpToken}&event=set_field&field=seat&value=${selectedSeat}`;
      
      // Отправляем через Image (работает везде, даже если fetch заблокирован)
      const img = new Image();
      img.src = pixelUrl;
      
      alert("📡 Дані відправлено! Перевір ManyChat через 5 секунд.");
      // В обычном браузере просто закрываем вкладку через секунду
      setTimeout(() => { window.history.back(); }, 1000);
    } else {
      alert("❌ Помилка: mcp_token не знайдено. Перевір посилання в ManyChat (має бути з ?mcp_token={{mcp_token}})");
    }
  });
</script>
</body>
</html>
